// ---- scoring: gentle sqrt expansion pushes the muddled middle outward ----
const EXPAND_C = 7.36; // tuned so a raw mean of +3 maps to ~+4.7
function expand(x) {
  const e = Math.sign(x) * Math.sqrt(Math.abs(x) * EXPAND_C);
  return Math.max(-10, Math.min(10, e));
}

function getArchetype(x, y) {
  for (const a of ARCHETYPES) {
    const [minI, maxI, minV, maxV] = a.bounds;
    if (x >= minI && x <= maxI && y >= minV && y <= maxV) return a;
  }
  let best = ARCHETYPES[0], bestD = Infinity;
  for (const a of ARCHETYPES) {
    const [minI, maxI, minV, maxV] = a.bounds;
    const cx = (minI + maxI) / 2, cy = (minV + maxV) / 2;
    const d = (x - cx) ** 2 + (y - cy) ** 2;
    if (d < bestD) { bestD = d; best = a; }
  }
  return best;
}

function ResultPlot({ impactScore, valenceScore, archetype }) {
  const canvasRef = useRef(null);
  const containerRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const cw = containerRef.current.clientWidth;
    const size = Math.min(cw, 460);
    canvas.width = size * 2; canvas.height = size * 2;
    canvas.style.width = size + "px"; canvas.style.height = size + "px";
    const ctx = canvas.getContext("2d");
    ctx.scale(2, 2);
    const pad = 44, plot = size - pad * 2;
    const cx = pad + plot / 2, cy = pad + plot / 2;
    const xS = (v) => pad + ((v + 10) / 20) * plot;
    const yS = (v) => pad + ((10 - v) / 20) * plot;

    ctx.fillStyle = "#1a1a2e";
    ctx.fillRect(0, 0, size, size);

    ARCHETYPES.forEach((a) => {
      const [x0, x1, y0, y1] = a.bounds;
      ctx.fillStyle = a.color;
      ctx.globalAlpha = a.name === archetype.name ? 0.42 : 0.08;
      ctx.fillRect(xS(x0), yS(y1), xS(x1) - xS(x0), yS(y0) - yS(y1));
      ctx.globalAlpha = 1;
      ctx.strokeStyle = "rgba(255,255,255,0.04)";
      ctx.lineWidth = 0.5;
      ctx.strokeRect(xS(x0), yS(y1), xS(x1) - xS(x0), yS(y0) - yS(y1));
    });

    ctx.strokeStyle = "rgba(255,255,255,0.22)";
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(cx, pad); ctx.lineTo(cx, pad + plot); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pad, cy); ctx.lineTo(pad + plot, cy); ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = "rgba(255,255,255,0.4)";
    ctx.font = "bold 9px system-ui, sans-serif";
    ctx.textAlign = "right"; ctx.fillText("OVERHYPED", cx - 8, cy - 6);
    ctx.textAlign = "left"; ctx.fillText("TRANSFORMATIVE", cx + 8, cy - 6);
    ctx.textAlign = "center"; ctx.fillText("GOOD", cx, pad - 10);
    ctx.fillText("BAD", cx, pad + plot + 16);

    const px = xS(impactScore), py = yS(valenceScore);
    const grad = ctx.createRadialGradient(px, py, 0, px, py, 22);
    grad.addColorStop(0, "rgba(255,255,255,0.5)");
    grad.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(px, py, 22, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = archetype.color;
    ctx.beginPath(); ctx.arc(px, py, 8, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2.5; ctx.stroke();

    ctx.strokeStyle = "rgba(255,255,255,0.1)";
    ctx.lineWidth = 1;
    ctx.strokeRect(pad, pad, plot, plot);
  }, [impactScore, valenceScore, archetype]);
  return (
    <div ref={containerRef} style={{ maxWidth: 460, margin: "0 auto" }}>
      <canvas ref={canvasRef} />
    </div>
  );
}

  const answered = Object.keys(answers).length;

  const handleSelect = (qIdx, optIdx) => {
    setAnswers((prev) => ({ ...prev, [qIdx]: optIdx }));
    if (qIdx < total - 1) setTimeout(() => setCurrentQ(qIdx + 1), 200);
  };
  const goNext = () => { if (currentQ < total - 1) setCurrentQ(currentQ + 1); };
  const goBack = () => { if (currentQ > 0) setCurrentQ(currentQ - 1); };

  const computeScores = () => {
    let iSum = 0, vSum = 0, n = 0;
    for (const [qIdx, optIdx] of Object.entries(answers)) {
      const opt = QUESTIONS[parseInt(qIdx)].options[optIdx];
      iSum += opt.impact; vSum += opt.valence; n++;
    }
    if (n === 0) return { rawI: 0, rawV: 0, impact: 0, valence: 0 };
    const rawI = iSum / n, rawV = vSum / n;
    return { rawI, rawV, impact: expand(rawI), valence: expand(rawV) };
  };

  if (showResult) {
    const { impact, valence } = computeScores();
    const archetype = getArchetype(impact, valence);
    return (
      <div style={{ minHeight: "100vh", background: "#1a1a2e", color: "#fff", fontFamily: "system-ui, -apple-system, sans-serif", padding: "40px 20px" }}>
        <div style={{ maxWidth: 520, margin: "0 auto" }}>
          <h1 style={{ fontSize: 26, fontWeight: 700, textAlign: "center", marginBottom: 6 }}>Your AI Compass</h1>
          <p style={{ textAlign: "center", color: "rgba(255,255,255,0.4)", fontSize: 13, marginBottom: 28 }}>{answered} of {total} questions answered</p>
          <ResultPlot impactScore={impact} valenceScore={valence} archetype={archetype} />
          <div style={{ marginTop: 20, padding: "24px 28px", background: "rgba(255,255,255,0.04)", borderRadius: 12, maxWidth: 460, margin: "20px auto 0", textAlign: "left" }}>
            <div style={{ fontSize: 13, color: "rgba(255,255,255,0.35)", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.06em", fontWeight: 600 }}>You are...</div>
            <div style={{ fontSize: 27, fontWeight: 700, color: archetype.color, marginBottom: 2, lineHeight: 1.2 }}>{archetype.name}</div>
            <div style={{ fontSize: 14, color: "rgba(255,255,255,0.5)", marginBottom: 12, fontStyle: "italic" }}>patron saint: {archetype.person}</div>
            <div style={{ fontSize: 15, color: "rgba(255,255,255,0.72)", lineHeight: 1.6 }}>{archetype.desc}</div>
            <div style={{ marginTop: 16, paddingTop: 14, borderTop: "1px solid rgba(255,255,255,0.06)", fontSize: 12, color: "rgba(255,255,255,0.3)", fontFamily: "monospace" }}>
              Impact: {impact > 0 ? "+" : ""}{impact.toFixed(1)} &nbsp;&nbsp;&bull;&nbsp;&nbsp; Valence: {valence > 0 ? "+" : ""}{valence.toFixed(1)}
            </div>
          </div>
          <div style={{ textAlign: "center", marginTop: 28, display: "flex", gap: 10, justifyContent: "center" }}>
            <button onClick={() => setShowResult(false)} style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)", color: "#fff", padding: "10px 24px", borderRadius: 8, fontSize: 14, cursor: "pointer" }}>Review Answers</button>
            <button onClick={() => { setAnswers({}); setCurrentQ(0); setShowResult(false); }} style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)", color: "#fff", padding: "10px 24px", borderRadius: 8, fontSize: 14, cursor: "pointer" }}>Retake</button>
          </div>
        </div>
      </div>
    );
  }

  const q = QUESTIONS[currentQ];
  const selectedOpt = answers[currentQ];
  const progress = (answered / total) * 100;
  const isLast = currentQ === total - 1;
  return (
    <div style={{ minHeight: "100vh", background: "#1a1a2e", color: "#fff", fontFamily: "system-ui, -apple-system, sans-serif", padding: "40px 16px", display: "flex", flexDirection: "column", alignItems: "center" }}>
      <div style={{ maxWidth: 560, width: "100%" }}>
        <h1 style={{ fontSize: 26, fontWeight: 700, textAlign: "center", marginBottom: 4 }}>The AI Compass</h1>
        <p style={{ textAlign: "center", color: "rgba(255,255,255,0.4)", fontSize: 13, marginBottom: 28 }}>{total} questions. Where do you actually land on AI?</p>
        <div style={{ height: 3, background: "rgba(255,255,255,0.06)", borderRadius: 2, marginBottom: 36, overflow: "hidden" }}>
          <div style={{ height: "100%", width: progress + "%", background: "linear-gradient(90deg, #ffdc64, #e8a030)", borderRadius: 2, transition: "width 0.3s ease" }} />
        </div>
        <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: "rgba(255,220,100,0.5)", marginBottom: 6 }}>{q.topic}</div>
        <div style={{ fontSize: 12, color: "rgba(255,255,255,0.25)", marginBottom: 10, fontFamily: "monospace" }}>{currentQ + 1} / {total}</div>
        <div key={currentQ} style={{ fontSize: 18, fontWeight: 600, lineHeight: 1.45, marginBottom: 24, minHeight: 48 }}>{q.prompt}</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 32 }}>
          {q.options.map((opt, i) => {
            const isSel = selectedOpt === i;
            return (
              <button key={i} onClick={() => handleSelect(currentQ, i)} style={{ padding: "11px 16px", background: isSel ? "rgba(255,220,100,0.12)" : "rgba(255,255,255,0.03)", border: isSel ? "1px solid rgba(255,220,100,0.4)" : "1px solid rgba(255,255,255,0.08)", borderRadius: 8, color: isSel ? "#ffdc64" : "rgba(255,255,255,0.7)", fontSize: 14, lineHeight: 1.45, cursor: "pointer", textAlign: "left", transition: "all 0.12s ease", fontWeight: isSel ? 600 : 400 }}>{opt.text}</button>
            );
          })}
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <button onClick={goBack} disabled={currentQ === 0} style={{ background: "none", border: "none", color: currentQ === 0 ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.5)", fontSize: 14, cursor: currentQ === 0 ? "default" : "pointer", padding: "8px 0" }}>&larr; Back</button>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            {selectedOpt === undefined && !isLast && (
              <button onClick={goNext} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.25)", fontSize: 13, cursor: "pointer", padding: "8px 0" }}>Skip &rarr;</button>
            )}
            {selectedOpt !== undefined && !isLast && (
              <button onClick={goNext} style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)", color: "#fff", padding: "9px 22px", borderRadius: 7, fontSize: 14, cursor: "pointer" }}>Next &rarr;</button>
            )}
            {isLast && selectedOpt !== undefined && (
              <button onClick={() => setShowResult(true)} style={{ background: "linear-gradient(135deg, #ffdc64, #e8a030)", border: "none", color: "#1a1a2e", padding: "10px 28px", borderRadius: 8, fontSize: 15, fontWeight: 700, cursor: "pointer" }}>See My Results</button>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<AICompass />);
var vb = document.createElement("div");
vb.textContent = "v3";
vb.style.cssText = "position:fixed;bottom:8px;right:10px;font-family:system-ui,sans-serif;font-size:11px;color:rgba(255,255,255,0.35);background:rgba(0,0,0,0.3);padding:2px 7px;border-radius:4px;z-index:9999;pointer-events:none;";
document.body.appendChild(vb);
</script>
</body>
</html>
