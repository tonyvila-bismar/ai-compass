// ---- classifier (territory math v6: pure nearest-seed in the Mahalanobis metric) ----
// Built by ai_sim.py: simulate a population with the LIVE mean-scoring formula, whiten by
// the population covariance (icov), place each archetype's seed at its answerers' centroid,
// then classify by argmin (x-seed)' icov (x-seed). No expansion, no rectangles, no weights.
// SEEDS[i] aligns with ARCHETYPES[i] by index. VIEW = [xmin,xmax,ymin,ymax] display window.
const SEEDS=[[-3.9887, -3.3523], [-4.2539, -1.3466], [-2.5386, 1.5567], [-2.6938, -3.8332], [-2.9712, -1.2463], [-1.5043, 1.49], [-0.3409, 2.8248], [-0.2579, -4.1591], [0.0442, -2.3791], [0.5856, 0.3469], [0.943, 2.1841], [1.6152, 3.6044], [2.0911, -4.4177], [1.4594, -2.6224], [2.3077, -2.6044], [2.1338, -0.6499], [2.4435, 1.4131], [2.7514, 2.6649], [3.7725, 4.4914], [3.2963, -4.5922], [3.5363, -2.942], [3.7193, -0.8298], [3.9654, 1.3477], [4.4317, 3.3], [5.2866, 5.0658], [4.4313, -4.0925], [4.9861, -2.068], [5.8433, 1.3922], [6.369, 4.2134], [6.6344, 5.438]];
const ICOV=[[0.12261, -0.073063], [-0.073063, 0.149168]];
const VIEW=[-5.14, 7.71, -5.54, 6.25];
const CHART_PADDING = 44;
const CHART_MAX_SIZE = 460;

function mdist(x, y, sx, sy) {           // squared Mahalanobis distance to seed (sx,sy)
  const dx = x - sx, dy = y - sy;
  return dx * (ICOV[0][0] * dx + ICOV[0][1] * dy) + dy * (ICOV[1][0] * dx + ICOV[1][1] * dy);
}

function seedIndex(x, y) {                // nearest seed = the archetype (weights are 0)
  let best = 0, bestD = Infinity;
  for (let i = 0; i < SEEDS.length; i++) {
    const d = mdist(x, y, SEEDS[i][0], SEEDS[i][1]);
    if (d < bestD) { bestD = d; best = i; }
  }
  return best;
}

function getArchetype(x, y) { return ARCHETYPES[seedIndex(x, y)]; }

// ---- compass chart: territory shading + seed dots; optional user point and seed numbers ----
function CompassChart({ point, highlightIdx, showNumbers, onSelectArchetype }) {
  const canvasRef = useRef(null);
  const containerRef = useRef(null);
  const handleClick = (e) => {
    if (!onSelectArchetype || !canvasRef.current) return;
    const rect = canvasRef.current.getBoundingClientRect();
    const size = rect.width;
    const pad = CHART_PADDING, plot = size - pad * 2;
    const px = e.clientX - rect.left;
    const py = e.clientY - rect.top;
    if (px < pad || px > pad + plot || py < pad || py > pad + plot) return;
    const [vx0, vx1, vy0, vy1] = VIEW;
    const impact = vx0 + ((px - pad) / plot) * (vx1 - vx0);
    const valence = vy1 - ((py - pad) / plot) * (vy1 - vy0);
    onSelectArchetype(seedIndex(impact, valence));
  };
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const cw = containerRef.current.clientWidth;
    const size = Math.min(cw, CHART_MAX_SIZE);
    canvas.width = size * 2; canvas.height = size * 2;
    canvas.style.width = size + "px"; canvas.style.height = size + "px";
    const ctx = canvas.getContext("2d");
    ctx.scale(2, 2);
    const pad = CHART_PADDING, plot = size - pad * 2;
    const [vx0, vx1, vy0, vy1] = VIEW;
    const xS = (v) => pad + ((v - vx0) / (vx1 - vx0)) * plot;
    const yS = (v) => pad + ((vy1 - v) / (vy1 - vy0)) * plot;
    const xI = (px) => vx0 + ((px - pad) / plot) * (vx1 - vx0);
    const yI = (py) => vy1 - ((py - pad) / plot) * (vy1 - vy0);

    ctx.fillStyle = "#1a1a2e";
    ctx.fillRect(0, 0, size, size);

    // territory shading: paint each cell by its nearest seed in the Mahalanobis metric
    const STEP = 5;
    for (let py = pad; py < pad + plot; py += STEP) {
      for (let px = pad; px < pad + plot; px += STEP) {
        const i = seedIndex(xI(px + STEP / 2), yI(py + STEP / 2));
        ctx.fillStyle = ARCHETYPES[i].color;
        ctx.globalAlpha = i === highlightIdx ? 0.58 : 0.20;
        ctx.fillRect(px, py, STEP, STEP);
      }
    }
    ctx.globalAlpha = 1;

    // seed dots; chosen one ringed
    SEEDS.forEach((s, i) => {
      const sx = xS(s[0]), sy = yS(s[1]);
      ctx.fillStyle = ARCHETYPES[i].color;
      ctx.globalAlpha = i === highlightIdx ? 1 : 0.75;
      ctx.beginPath(); ctx.arc(sx, sy, i === highlightIdx ? 3.5 : 2, 0, Math.PI * 2); ctx.fill();
      if (showNumbers) {
        ctx.globalAlpha = 0.9;
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.font = "bold 8px system-ui, sans-serif";
        ctx.textAlign = "left"; ctx.textBaseline = "middle";
        ctx.fillText(String(i + 1), sx + 4, sy);
      }
    });
    ctx.globalAlpha = 1; ctx.textBaseline = "alphabetic";

    // axis cross at impact=0 / valence=0
    const cx = xS(0), cy = yS(0);
    ctx.strokeStyle = "rgba(255,255,255,0.22)";
    ctx.lineWidth = 1.5;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(cx, pad); ctx.lineTo(cx, pad + plot); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pad, cy); ctx.lineTo(pad + plot, cy); ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = "rgba(255,255,255,0.45)";
    ctx.font = "bold 9px system-ui, sans-serif";
    ctx.textAlign = "right"; ctx.fillText("OVERHYPED", cx - 8, cy - 6);
    ctx.textAlign = "left"; ctx.fillText("TRANSFORMATIVE", cx + 8, cy - 6);
    ctx.textAlign = "center"; ctx.fillText("GOOD", cx, pad - 10);
    ctx.fillText("BAD", cx, pad + plot + 16);

    if (point) {
      const px = xS(point[0]), py = yS(point[1]);
      const grad = ctx.createRadialGradient(px, py, 0, px, py, 22);
      grad.addColorStop(0, "rgba(255,255,255,0.5)");
      grad.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(px, py, 22, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = highlightIdx >= 0 ? ARCHETYPES[highlightIdx].color : "#fff";
      ctx.beginPath(); ctx.arc(px, py, 8, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#fff"; ctx.lineWidth = 2.5; ctx.stroke();
    }

    ctx.strokeStyle = "rgba(255,255,255,0.1)";
    ctx.lineWidth = 1;
    ctx.strokeRect(pad, pad, plot, plot);
  }, [point, highlightIdx, showNumbers]);
  return (
    <div ref={containerRef} style={{ maxWidth: CHART_MAX_SIZE, margin: "0 auto" }}>
      <canvas ref={canvasRef} onClick={handleClick} style={{ cursor: onSelectArchetype ? "pointer" : "default" }} />
    </div>
  );
}

// ---- the "see all archetypes" view: full chart + every archetype's name/saint/description ----
function AllArchetypes({ onBack }) {
  const [selectedIdx, setSelectedIdx] = useState(null);
  const visible = selectedIdx === null ? ARCHETYPES.map((a, i) => ({ a, i })) : [{ a: ARCHETYPES[selectedIdx], i: selectedIdx }];
  return (
    <div style={{ minHeight: "100vh", background: "#1a1a2e", color: "#fff", fontFamily: "system-ui, -apple-system, sans-serif", padding: "40px 20px" }}>
      <div style={{ maxWidth: 560, margin: "0 auto" }}>
        <h1 style={{ fontSize: 26, fontWeight: 700, textAlign: "center", marginBottom: 6 }}>All {ARCHETYPES.length} Archetypes</h1>
        <p style={{ textAlign: "center", color: "rgba(255,255,255,0.4)", fontSize: 13, marginBottom: 24 }}>{selectedIdx === null ? "Click anywhere on the map to focus on a single archetype." : "Click another region to switch focus, or show the full list again."}</p>
        <CompassChart highlightIdx={selectedIdx ?? -1} showNumbers={selectedIdx === null} onSelectArchetype={(idx) => setSelectedIdx((prev) => prev === idx ? null : idx)} />
        {selectedIdx !== null && (
          <div style={{ textAlign: "center", marginTop: 16 }}>
            <button onClick={() => setSelectedIdx(null)} style={{ background: "none", border: "none", color: "rgba(255,220,100,0.7)", fontSize: 13, cursor: "pointer", textDecoration: "underline", textUnderlineOffset: "3px", padding: "6px 0" }}>Show all archetypes</button>
          </div>
        )}
        <div style={{ marginTop: 28, display: "flex", flexDirection: "column", gap: 12 }}>
          {visible.map(({ a, i }) => (
            <div key={i} style={{ display: "flex", gap: 12, padding: "14px 16px", background: "rgba(255,255,255,0.04)", borderRadius: 10, alignItems: "flex-start", border: selectedIdx === i ? `1px solid ${a.color}` : "1px solid transparent" }}>
              <div style={{ flexShrink: 0, width: 26, textAlign: "right", fontFamily: "monospace", fontSize: 13, color: "rgba(255,255,255,0.4)", paddingTop: 2 }}>{i + 1}</div>
              <div style={{ flexShrink: 0, width: 12, height: 12, borderRadius: 3, background: a.color, marginTop: 4 }} />
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 17, fontWeight: 700, color: a.color, lineHeight: 1.25 }}>{a.name}</div>
                <div style={{ fontSize: 13, color: "rgba(255,255,255,0.5)", marginBottom: 6, fontStyle: "italic" }}>patron saint: {a.person}</div>
                <div style={{ fontSize: 14, color: "rgba(255,255,255,0.72)", lineHeight: 1.55 }}>{a.desc}</div>
              </div>
            </div>
          ))}
        </div>
        <div style={{ textAlign: "center", marginTop: 28 }}>
          <button onClick={onBack} style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)", color: "#fff", padding: "10px 24px", borderRadius: 8, fontSize: 14, cursor: "pointer" }}>&larr; Back</button>
        </div>
      </div>
    </div>
  );
}

function AICompass() {
  const [answers, setAnswers] = useState({});
  const [currentQ, setCurrentQ] = useState(0);
  const [showResult, setShowResult] = useState(false);
  const [showAll, setShowAll] = useState(false);
  const total = QUESTIONS.length;
  const answered = Object.keys(answers).length;

  const handleSelect = (qIdx, optIdx) => {
    setAnswers((prev) => ({ ...prev, [qIdx]: optIdx }));
    if (qIdx < total - 1) setTimeout(() => setCurrentQ(qIdx + 1), 200);
  };
  const goNext = () => { if (currentQ < total - 1) setCurrentQ(currentQ + 1); };
  const goBack = () => { if (currentQ > 0) setCurrentQ(currentQ - 1); };

  const computeScores = () => {
    let iSum = 0, vSum = 0, n = 0;
    for (const [qIdx, optIdx] of Object.entries(answers)) {
      const opt = QUESTIONS[parseInt(qIdx)].options[optIdx];
      iSum += opt.impact; vSum += opt.valence; n++;
    }
    if (n === 0) return { rawI: 0, rawV: 0, impact: 0, valence: 0 };
    const rawI = iSum / n, rawV = vSum / n;
    // No expansion: seeds live in this same raw (compressed) score space, so we classify
    // the raw mean directly. The Mahalanobis territories do the spreading, not a curve.
    return { rawI, rawV, impact: rawI, valence: rawV };
  };

  const linkStyle = { background: "none", border: "none", color: "rgba(255,220,100,0.7)", fontSize: 13, cursor: "pointer", textDecoration: "underline", textUnderlineOffset: "3px", padding: "6px 0" };

  if (showAll) {
    return <AllArchetypes onBack={() => setShowAll(false)} />;
  }

  if (showResult) {
    const { impact, valence } = computeScores();
    const idx = seedIndex(impact, valence);
    const archetype = ARCHETYPES[idx];
    return (
      <div style={{ minHeight: "100vh", background: "#1a1a2e", color: "#fff", fontFamily: "system-ui, -apple-system, sans-serif", padding: "40px 20px" }}>
        <div style={{ maxWidth: 520, margin: "0 auto" }}>
          <h1 style={{ fontSize: 26, fontWeight: 700, textAlign: "center", marginBottom: 6 }}>Your AI Compass</h1>
          <p style={{ textAlign: "center", color: "rgba(255,255,255,0.4)", fontSize: 13, marginBottom: 28 }}>{answered} of {total} questions answered</p>
          <CompassChart point={[impact, valence]} highlightIdx={idx} />
          <div style={{ marginTop: 20, padding: "24px 28px", background: "rgba(255,255,255,0.04)", borderRadius: 12, maxWidth: 460, margin: "20px auto 0", textAlign: "left" }}>
            <div style={{ fontSize: 13, color: "rgba(255,255,255,0.35)", marginBottom: 4, textTransform: "uppercase", letterSpacing: "0.06em", fontWeight: 600 }}>You are...</div>
            <div style={{ fontSize: 27, fontWeight: 700, color: archetype.color, marginBottom: 2, lineHeight: 1.2 }}>{archetype.name}</div>
            <div style={{ fontSize: 14, color: "rgba(255,255,255,0.5)", marginBottom: 12, fontStyle: "italic" }}>patron saint: {archetype.person}</div>
            <div style={{ fontSize: 15, color: "rgba(255,255,255,0.72)", lineHeight: 1.6 }}>{archetype.desc}</div>
            <div style={{ marginTop: 16, paddingTop: 14, borderTop: "1px solid rgba(255,255,255,0.06)", fontSize: 12, color: "rgba(255,255,255,0.3)", fontFamily: "monospace" }}>
              Impact: {impact > 0 ? "+" : ""}{impact.toFixed(1)} &nbsp;&nbsp;&bull;&nbsp;&nbsp; Valence: {valence > 0 ? "+" : ""}{valence.toFixed(1)}
            </div>
          </div>
          <div style={{ textAlign: "center", marginTop: 18 }}>
            <button onClick={() => setShowAll(true)} style={linkStyle}>See all {ARCHETYPES.length} archetypes &rarr;</button>
          </div>
          <div style={{ textAlign: "center", marginTop: 10, display: "flex", gap: 10, justifyContent: "center" }}>
            <button onClick={() => setShowResult(false)} style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)", color: "#fff", padding: "10px 24px", borderRadius: 8, fontSize: 14, cursor: "pointer" }}>Review Answers</button>
            <button onClick={() => { setAnswers({}); setCurrentQ(0); setShowResult(false); }} style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)", color: "#fff", padding: "10px 24px", borderRadius: 8, fontSize: 14, cursor: "pointer" }}>Retake</button>
          </div>
        </div>
      </div>
    );
  }

  const q = QUESTIONS[currentQ];
  const selectedOpt = answers[currentQ];
  const progress = (answered / total) * 100;
  const isLast = currentQ === total - 1;
  return (
    <div style={{ minHeight: "100vh", background: "#1a1a2e", color: "#fff", fontFamily: "system-ui, -apple-system, sans-serif", padding: "40px 16px", display: "flex", flexDirection: "column", alignItems: "center" }}>
      <div style={{ maxWidth: 560, width: "100%" }}>
        <h1 style={{ fontSize: 26, fontWeight: 700, textAlign: "center", marginBottom: 4 }}>The AI Compass</h1>
        <p style={{ textAlign: "center", color: "rgba(255,255,255,0.4)", fontSize: 13, marginBottom: 6 }}>{total} questions. Where do you actually land on AI?</p>
        <p style={{ textAlign: "center", color: "rgba(255,220,100,0.55)", fontSize: 12, marginBottom: 26 }}>Not sure on one? You can skip any question &mdash; only the answers you give are scored.</p>
        <div style={{ height: 3, background: "rgba(255,255,255,0.06)", borderRadius: 2, marginBottom: 36, overflow: "hidden" }}>
          <div style={{ height: "100%", width: progress + "%", background: "linear-gradient(90deg, #ffdc64, #e8a030)", borderRadius: 2, transition: "width 0.3s ease" }} />
        </div>
        <div style={{ fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", color: "rgba(255,220,100,0.5)", marginBottom: 6 }}>{q.topic}</div>
        <div style={{ fontSize: 12, color: "rgba(255,255,255,0.25)", marginBottom: 10, fontFamily: "monospace" }}>{currentQ + 1} / {total}</div>
        <div key={currentQ} style={{ fontSize: 18, fontWeight: 600, lineHeight: 1.45, marginBottom: 24, minHeight: 48 }}>{q.prompt}</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 32 }}>
          {q.options.map((opt, i) => {
            const isSel = selectedOpt === i;
            return (
              <button key={i} onClick={() => handleSelect(currentQ, i)} style={{ padding: "11px 16px", background: isSel ? "rgba(255,220,100,0.12)" : "rgba(255,255,255,0.03)", border: isSel ? "1px solid rgba(255,220,100,0.4)" : "1px solid rgba(255,255,255,0.08)", borderRadius: 8, color: isSel ? "#ffdc64" : "rgba(255,255,255,0.7)", fontSize: 14, lineHeight: 1.45, cursor: "pointer", textAlign: "left", transition: "all 0.12s ease", fontWeight: isSel ? 600 : 400 }}>{opt.text}</button>
            );
          })}
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <button onClick={goBack} disabled={currentQ === 0} style={{ background: "none", border: "none", color: currentQ === 0 ? "rgba(255,255,255,0.12)" : "rgba(255,255,255,0.5)", fontSize: 14, cursor: currentQ === 0 ? "default" : "pointer", padding: "8px 0" }}>&larr; Back</button>
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            {selectedOpt === undefined && !isLast && (
              <button onClick={goNext} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.25)", fontSize: 13, cursor: "pointer", padding: "8px 0" }}>Skip &rarr;</button>
            )}
            {selectedOpt !== undefined && !isLast && (
              <button onClick={goNext} style={{ background: "rgba(255,255,255,0.08)", border: "1px solid rgba(255,255,255,0.15)", color: "#fff", padding: "9px 22px", borderRadius: 7, fontSize: 14, cursor: "pointer" }}>Next &rarr;</button>
            )}
            {isLast && answered > 0 && (
              <button onClick={() => setShowResult(true)} style={{ background: "linear-gradient(135deg, #ffdc64, #e8a030)", border: "none", color: "#1a1a2e", padding: "10px 28px", borderRadius: 8, fontSize: 15, fontWeight: 700, cursor: "pointer" }}>See My Results</button>
            )}
          </div>
        </div>
        <div style={{ textAlign: "center", marginTop: 30, paddingTop: 18, borderTop: "1px solid rgba(255,255,255,0.06)" }}>
          <button onClick={() => setShowAll(true)} style={linkStyle}>See all {ARCHETYPES.length} archetypes &rarr;</button>
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<AICompass />);
var vb = document.createElement("div");
vb.textContent = "v11";
vb.style.cssText = "position:fixed;bottom:8px;right:10px;font-family:system-ui,sans-serif;font-size:11px;color:rgba(255,255,255,0.35);background:rgba(0,0,0,0.3);padding:2px 7px;border-radius:4px;z-index:9999;pointer-events:none;";
document.body.appendChild(vb);
</script>
</body>
</html>
